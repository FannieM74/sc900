            - paragraph [ref=e106]: "The shared responsibility model defines how security responsibilities are divided between the cloud service provider (CSP) and the customer. The division of responsibility depends on the cloud deployment model:"
            - generic [ref=e107]:
              - generic [ref=e108]: "On-premises:"
              - generic [ref=e109]: The customer is responsible for everything — physical security, hardware, networking, OS, applications, data, and identities.
            - generic [ref=e110]:
              - generic [ref=e111]: "Infrastructure as a Service (IaaS):"
              - generic [ref=e112]: The CSP manages the physical infrastructure (datacenters, networking, physical hosts). The customer manages the OS, applications, data, identities, and network controls.
            - generic [ref=e113]:
              - generic [ref=e114]: "Platform as a Service (PaaS):"
              - generic [ref=e115]: The CSP manages the infrastructure and the platform (OS, runtime, middleware). The customer manages applications, data, identities, and access.
            - generic [ref=e116]:
              - generic [ref=e117]: "Software as a Service (SaaS):"
