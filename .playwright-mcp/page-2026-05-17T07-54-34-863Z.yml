            - paragraph [ref=e307]: "The shared responsibility model defines how security responsibilities are divided between the cloud service provider (CSP) and the customer. The division of responsibility depends on the cloud deployment model:"
            - generic [ref=e308]:
              - generic [ref=e309]: "On-premises:"
              - generic [ref=e310]: The customer is responsible for everything — physical security, hardware, networking, OS, applications, data, and identities.
            - generic [ref=e311]:
              - generic [ref=e312]: "Infrastructure as a Service (IaaS):"
              - generic [ref=e313]: The CSP manages the physical infrastructure (datacenters, networking, physical hosts). The customer manages the OS, applications, data, identities, and network controls.
            - generic [ref=e314]:
              - generic [ref=e315]: "Platform as a Service (PaaS):"
              - generic [ref=e316]: The CSP manages the infrastructure and the platform (OS, runtime, middleware). The customer manages applications, data, identities, and access.
            - generic [ref=e317]:
              - generic [ref=e318]: "Software as a Service (SaaS):"
              - generic [ref=e319]: The CSP manages almost everything — infrastructure, platform, and applications. The customer is responsible for data, identities, and access management.
            - paragraph [ref=e320]: "Key point: Regardless of the model, the customer is ALWAYS responsible for their data, identities, and access management. The CSP is never responsible for customer data."
          - generic [ref=e321]:
            - paragraph [ref=e322]: 💡 Exam Tip
            - paragraph [ref=e323]: SaaS places the MOST responsibility on the cloud provider. IaaS places the MOST responsibility on the customer.
