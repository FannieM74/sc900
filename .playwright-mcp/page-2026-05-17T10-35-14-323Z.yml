            - paragraph [ref=e204]: "The shared responsibility model defines how security responsibilities are divided between the cloud service provider (CSP) and the customer. The division of responsibility depends on the cloud deployment model:"
            - generic [ref=e205]:
              - generic [ref=e206]: "On-premises:"
              - generic [ref=e207]: The customer is responsible for everything — physical security, hardware, networking, OS, applications, data, and identities.
            - generic [ref=e208]:
              - generic [ref=e209]: "Infrastructure as a Service (IaaS):"
              - generic [ref=e210]: The CSP manages the physical infrastructure (datacenters, networking, physical hosts). The customer manages the OS, applications, data, identities, and network controls.
            - generic [ref=e211]:
              - generic [ref=e212]: "Platform as a Service (PaaS):"
              - generic [ref=e213]: The CSP manages the infrastructure and the platform (OS, runtime, middleware). The customer manages applications, data, identities, and access.
            - generic [ref=e214]:
              - generic [ref=e215]: "Software as a Service (SaaS):"
              - generic [ref=e216]: The CSP manages almost everything — infrastructure, platform, and applications. The customer is responsible for data, identities, and access management.
            - paragraph [ref=e217]: "Key point: Regardless of the model, the customer is ALWAYS responsible for their data, identities, and access management. The CSP is never responsible for customer data."
